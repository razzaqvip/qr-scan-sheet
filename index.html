<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ticket Scanner RBG12</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base Design sesuai Gambar */
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .app-container { max-width: 450px; margin: auto; padding: 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header-text { font-weight: bold; font-size: 1.4rem; color: #ff4500; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .header-text span { color: #fff; font-weight: normal; font-style: italic; }
        .sub-header { font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }

        /* Scanner Frame (Gambar KAMERA-OFF & ON) */
        .scanner-wrapper { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            background: linear-gradient(180deg, #ff4500 0%, #000 100%); 
            border-radius: 50px; padding: 3px; margin-bottom: 30px;
        }
        .scanner-inner { 
            background: #000; border-radius: 47px; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        #reader { width: 110%; height: 110%; border: none !important; }
        #reader video { object-fit: cover !important; }

        /* Overlay Siku Kamera (Gambar KAMERA-ON) */
        .camera-overlay {
            position: absolute; top: 15%; left: 15%; right: 15%; bottom: 15%;
            border: 4px solid transparent; pointer-events: none; z-index: 10;
        }
        .camera-overlay::before, .camera-overlay::after, .corner-tl, .corner-br {
            content: ""; position: absolute; width: 40px; height: 40px; border-color: #fff; border-style: solid;
        }
        .corner-tl { top: 0; left: 0; border-width: 5px 0 0 5px; }
        .corner-tr { position: absolute; top: 0; right: 0; width: 40px; height: 40px; border-top: 5px solid #fff; border-right: 5px solid #fff; }
        .corner-bl { position: absolute; bottom: 0; left: 0; width: 40px; height: 40px; border-bottom: 5px solid #fff; border-left: 5px solid #fff; }
        .corner-br { bottom: 0; right: 0; border-width: 0 5px 5px 0; }

        /* Tombol & Input (Gambar SCAN-TICKET-SUKSES) */
        .btn-action { 
            background: #ff4500; color: #fff; border: none; padding: 15px 30px; 
            border-radius: 25px; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; cursor: pointer;
        }
        .input-code-label { text-align: left; font-weight: bold; font-size: 0.9rem; margin-top: 30px; margin-bottom: 8px; }
        .input-group-custom { 
            display: flex; background: #333; border-radius: 30px; padding: 5px; border: 2px solid #ff4500;
        }
        .input-group-custom input { 
            background: transparent; border: none; color: #fff; padding: 10px 20px; flex-grow: 1; outline: none;
        }
        .btn-cek { background: #ff4500; border-radius: 25px; border: none; color: #fff; padding: 5px 25px; font-weight: bold; }

        /* Notifikasi (Gambar SCAN-TICKET-GAGAL & SUKSES) */
        .notif-box { 
            margin-top: 25px; border-radius: 40px; padding: 25px; display: none; 
            font-weight: bold; animation: slideUp 0.3s ease;
        }
        .notif-sukses { background: #6fff3f; color: #155724; } /* Warna Hijau Terang sesuai gambar */
        .notif-gagal { background: #f24444; color: #fff; } /* Warna Merah sesuai gambar */
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .footer-logo { 
            margin-top: auto; background: #ff4500; width: 110%; margin-left: -5%; 
            height: 100px; border-radius: 40px 40px 0 0; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-text">CURVANORD PSIR <span>EVENTS</span></div>
    <div class="sub-header">E-TICKET <i>SCANNER</i></div>

    <div class="scanner-wrapper">
        <div class="scanner-inner">
            <div id="reader"></div>
            <div id="camera-frame" class="camera-overlay" style="display:none;">
                <div class="corner-tl"></div>
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="corner-br"></div>
            </div>
            <button id="start-btn" class="btn-action">AKTIFKAN KAMERA</button>
        </div>
    </div>

    <div id="notif" class="notif-box"></div>
    <button id="reset-btn" class="btn-action" style="background:#ff9900; display:none; margin-top:15px;">SCAN LAGI</button>

    <div class="input-code-label">INPUT CODE</div>
    <div class="input-group-custom">
        <input type="text" id="manual-code" placeholder="Ketik kode...">
        <button onclick="kirimData(document.getElementById('manual-code').value)" class="btn-cek">CEK!</button>
    </div>

    <div class="footer-logo"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2WsfBJDRTsfYktOkccbSG9SG7HZ-_U03Vq4t1oiGwbbiZnWJwKxC0F8GAcI4I8rNe/exec";
    const html5QrCode = new Html5Qrcode("reader");
    const notifBox = document.getElementById('notif');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const cameraFrame = document.getElementById('camera-frame');

    startBtn.onclick = () => {
        const config = { fps: 15, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            html5QrCode.pause(true);
            kirimData(decodedText);
        }).then(() => {
            startBtn.style.display = "none";
            cameraFrame.style.display = "block";
        }).catch(err => alert("Kamera Error: Pastikan izin diberikan."));
    };

    function kirimData(kode) {
        if (!kode) return;
        notifBox.style.display = "block";
        notifBox.className = "notif-box"; // Reset class
        notifBox.style.background = "#333";
        notifBox.style.color = "#fff";
        notifBox.innerHTML = "MENGECEK TIKET...";

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ kode: kode })
        })
        .then(res => res.json())
        .then(data => {
            notifBox.innerHTML = data.message.replace(/\n/g, "<br>");
            if (data.message.includes("SCAN SUCCESS") || data.message.includes("BERHASIL")) {
                notifBox.classList.add("notif-sukses");
            } else {
                notifBox.classList.add("notif-gagal");
            }
            resetBtn.style.display = "inline-block";
        })
        .catch(err => {
            notifBox.innerHTML = "GAGAL TERHUBUNG KE SERVER";
            notifBox.classList.add("notif-gagal");
            resetBtn.style.display = "inline-block";
        });
    }

    resetBtn.onclick = () => {
        notifBox.style.display = "none";
        resetBtn.style.display = "none";
        document.getElementById('manual-code').value = "";
        html5QrCode.resume();
    };
</script>

</body>
</html>
