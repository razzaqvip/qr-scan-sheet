<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Validasi RBG12</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { max-width: 450px; width: 90%; background: #ffffff; color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-weight: bold; font-size: 16px; }
        .btn-scan { background: #198754; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h4 class="mb-3">VALIDASI TIKET</h4>
    
    <div id="reader"></div>
    
    <button id="start-btn" class="btn-scan">AKTIFKAN KAMERA</button>
    
    <div class="mt-4 border-top pt-3 text-start">
        <label class="small fw-bold text-muted">INPUT MANUAL</label>
        <div class="input-group mt-1">
            <input type="text" id="manual-code" class="form-control" placeholder="Ketik kode...">
            <button onclick="kirimData(document.getElementById('manual-code').value)" class="btn btn-primary">Cek</button>
        </div>
    </div>

    <div id="result" class="result-box"></div>
    <button id="reset-btn" class="btn btn-warning w-100 mt-3 fw-bold" style="display:none;">SCAN LAGI</button>
</div>

<script>
    // MASUKKAN LINK APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwb-48dfPhCHuZ_F8fseu34ZErclPqOq88fkcCz2UwzNtwiomP0lXcpJ8zTyLVP_sN1/exec";

    const html5QrCode = new Html5Qrcode("reader");
    const resultBox = document.getElementById('result');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');

    startBtn.onclick = () => {
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            html5QrCode.pause(true);
            kirimData(decodedText);
        }).catch(err => alert("Kamera Error: Pastikan izin diberikan."));
        startBtn.style.display = "none";
    };

    function kirimData(kode) {
        if (!kode) return;
        resultBox.style.display = "block";
        resultBox.style.background = "#f0f0f0";
        resultBox.style.color = "#333";
        resultBox.innerHTML = "Sedang mengecek...";

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ kode: kode })
        })
        .then(res => res.json())
        .then(data => {
            resultBox.innerHTML = data.message.replace(/\n/g, "<br>");
            if (data.message.includes("BERHASIL")) {
                resultBox.style.background = "#d4edda";
                resultBox.style.color = "#155724";
            } else {
                resultBox.style.background = "#f8d7da";
                resultBox.style.color = "#721c24";
            }
            resetBtn.style.display = "block";
        })
        .catch(err => {
            resultBox.innerHTML = "Error koneksi ke server.";
            console.error(err);
        });
    }

    resetBtn.onclick = () => {
        resultBox.style.display = "none";
        resetBtn.style.display = "none";
        document.getElementById('manual-code').value = "";
        html5QrCode.resume();
    };
</script>

</body>
</html>
